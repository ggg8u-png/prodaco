name: 키워드 단계 추가 (Promote keywords)

# 비개발자도 GitHub 웹에서 버튼으로 실행 가능:
#   저장소 → Actions 탭 → 왼쪽 "키워드 단계 추가" → "Run workflow"
#   → 추가할 개수(count) 입력 → 초록 "Run workflow" 클릭.
# 그러면 staging 풀(우선순위 높은 순)에서 N개를 keywords.json 으로 옮겨 커밋합니다.
# 커밋되면 Netlify 가 자동으로 재빌드·배포합니다.
#
# ⚠ 한 번에 너무 많이 올리면 도어웨이/대량생성 스팸 위험이 커집니다.
#    1회 1,000개 이하, 1~2주 간격 권장(점진 색인이 안전).

on:
  workflow_dispatch:
    inputs:
      count:
        description: "이번에 추가할 키워드 개수 (권장: 1000 이하)"
        required: true
        default: "1000"

permissions:
  contents: write

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Node 설치
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 키워드 승급 실행
        run: node scripts/promote-keywords.mjs --count "${{ github.event.inputs.count }}"

      - name: 변경 커밋·푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- src/data/keywords.json src/data/keywords-staging.json; then
            echo "변경 없음 — 승급할 항목이 없습니다."
            exit 0
          fi
          git add src/data/keywords.json src/data/keywords-staging.json
          git commit -m "키워드 단계 추가: +${{ github.event.inputs.count }} (staging→live)"
          git push
