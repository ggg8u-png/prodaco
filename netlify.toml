# netlify.toml — 프로다 (Next.js)
# =============================================================================
# Next.js 런타임을 명시적으로 선언한다.
# (Netlify UI 의 Build command·Publish directory 가 비어 있고 런타임 자동 감지가
#  안 잡히면 SSR/라우팅이 구성되지 않아 사이트 전체가 404 가 난다. 그래서 여기서
#  플러그인·빌드 명령·Node 버전을 직접 지정해 안정적으로 배포되게 한다.)
# publish 는 .next 로 고정한다. (UI 의 Publish directory 가 비어 있으면 Netlify 가
#  repo 루트를 publish 로 잡는데, @netlify/plugin-nextjs 는 "publish == base" 를 거부해
#  빌드가 실패한다. Next.js 빌드 산출물 디렉터리인 .next 를 명시해야 한다.)
[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# -----------------------------------------------------------------------------
# 페이지 생성 수(GENERATE_COUNT)는 이제 어드민(/admin)에서 바꿉니다 (코드 수정 불필요):
#   /admin → "⑪ 색인·SEO 설정" → "생성할 페이지 수(generateCount)" 수정 → 게시
#   → content/seo.json 에 커밋되고 Netlify 가 재빌드하며 그 개수만큼 생성합니다.
#
# (운영 긴급 오버라이드) Netlify 환경변수 GENERATE_COUNT 를 설정하면 어드민 값보다
# 우선합니다. 평상시에는 설정하지 마세요(어드민으로 관리). 아래에서 의도적으로 비워 둡니다.
#
# ⚠ 중요: 생성 수를 늘려도 검증 안 된 staging 페이지는 기본 noindex 입니다.
#   색인을 늘리려면 어드민 ⑩ 시공사례에 "지역+품목"을 정확히 지정한 사례를 추가하세요.
#   (큐레이션 라이브 + 시공사례로 검증된 페이지만 색인 — 도어웨이 패널티 방지.)
# =============================================================================

# -----------------------------------------------------------------------------
# 유틸리티 정적 HTML 은 색인에서 제외 (X-Robots-Tag: noindex)
# -----------------------------------------------------------------------------
# 이 파일들은 검색용 페이지가 아니라 배포/검증용 부산물이다. canonical 태그가 없어
# GSC 에서 "사용자가 선택한 표준이 없는 중복 페이지"로 잡히기 쉬우므로 noindex 처리한다.
#   · /__forms.html                : Netlify Forms 감지용 폼(사용자용 아님)
#   · /naver...html                : 네이버 소유확인 파일(수집은 되어야 하나 색인 불필요)
#   · /admin/*                     : Decap CMS 관리자 SPA(robots 로도 차단하지만 이중 안전)
# noindex 헤더는 파일 접근(폼 감지·소유확인)을 막지 않는다 — 색인만 제외한다.
[[headers]]
  for = "/__forms.html"
  [headers.values]
    X-Robots-Tag = "noindex"

[[headers]]
  for = "/naver6a050be646c7db6e35f88207353ed66d.html"
  [headers.values]
    X-Robots-Tag = "noindex"

[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Robots-Tag = "noindex"

# -----------------------------------------------------------------------------
# 301 리다이렉트 — GSC "찾을 수 없음(404)" 로 잡힌 옛 URL 을 관련 페이지로 넘긴다
# -----------------------------------------------------------------------------
# GSC → 색인 → "찾을 수 없음(404)" 리포트에서 정확한 2개 URL 을 확인한 뒤,
# 아래 예시 형식으로 실제 경로를 채워 넣으세요(삭제된 게 의도라면 그대로 두어도
# 됩니다 — 사이트맵/내부링크에는 이미 참조가 없어 자연 정리됩니다).
# 한글 경로는 퍼센트 인코딩(%EA%B0%95…) 형태로 적어야 합니다.
#
# [[redirects]]
#   from = "/삭제된-옛-슬러그"       # 예: /%EA%B0%95%EB%82%A8-...  (옛 지역+품목)
#   to = "/services/강남"            # 가장 관련 있는 살아있는 페이지(지역 허브 등)
#   status = 301
#   force = true
#
# [[redirects]]
#   from = "/blog/old-post-id"       # 삭제된 블로그 글이면 목록으로
#   to = "/blog"
#   status = 301
#   force = true
